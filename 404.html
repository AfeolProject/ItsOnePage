<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >

    <title>404 — ItsOnePage</title>

    <meta
      name="description"
      content="The requested page could not be found."
    >

    <meta
      name="robots"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    >

    <meta
      name="googlebot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    >

    <meta
      name="bingbot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    >

    <meta
      name="theme-color"
      content="#0d1117"
    >

    <meta
      name="color-scheme"
      content="dark"
    >

    <meta
      name="format-detection"
      content="telephone=no"
    >

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    >

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    >

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    >

    <link
      rel="icon"
      href="/favicon.ico"
      sizes="any"
    >

    <link
      rel="manifest"
      href="/site.webmanifest"
    >

    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: #0d1117;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #f0f6fc;
      }

      main {
        width: min(680px, calc(100% - 40px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(3rem, 10vw, 6rem);
        line-height: 1;
      }

      h2 {
        margin: 0 0 24px;
        font-size: clamp(1.3rem, 4vw, 2rem);
        font-weight: 500;
        line-height: 1.25;
        color: #c9d1d9;
      }

      p {
        max-width: 620px;
        margin: 0 0 16px;
        font-size: 1.1rem;
        line-height: 1.7;
        color: #c9d1d9;
      }

      a {
        color: #58a6ff;
        text-underline-offset: 3px;
      }

      a:hover {
        color: #79c0ff;
      }

      a:focus-visible {
        outline: 2px solid #58a6ff;
        outline-offset: 4px;
        border-radius: 2px;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>404</h1>

      <h2>This page does not exist.</h2>

      <p>
        The link may be outdated, or the page may have been removed.
      </p>

      <p>
        <a href="/">
          ← Back to homepage
        </a>
      </p>
    </main>
  </body>
</html>
