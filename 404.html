<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >

    <title>404 — ItsOnePage</title>

    <meta
      name="description"
      content="The requested page could not be found."
    >

    <meta
      name="robots"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    >

    <meta
      name="googlebot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    >

    <meta
      name="bingbot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    >

    <meta
      name="theme-color"
      content="#020b14"
    >

    <meta
      name="color-scheme"
      content="dark"
    >

    <meta
      name="format-detection"
      content="telephone=no"
    >

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    >

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    >

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    >

    <link
      rel="icon"
      href="/favicon.ico"
      sizes="any"
    >

    <link
      rel="manifest"
      href="/site.webmanifest"
    >

    <link
      rel="preload"
      href="/background-desktop.webp"
      as="image"
      type="image/webp"
      media="(min-width: 1025px)"
    >

    <link
      rel="preload"
      href="/background-tablet.webp"
      as="image"
      type="image/webp"
      media="(min-width: 641px) and (max-width: 1024px)"
    >

    <link
      rel="preload"
      href="/background-mobile.webp"
      as="image"
      type="image/webp"
      media="(max-width: 640px)"
    >

    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;

        background-color: #020b14;
        color: #f0f6fc;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: #020b14;
      }

      body {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        background: #020b14;
        color: #f0f6fc;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -2;
        content: "";
        background-color: #020b14;
        background-image: url("/background-desktop.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
      }

      @supports (
        background-image:
          image-set(
            url("/background-desktop.webp") type("image/webp")
          )
      ) {
        body::before {
          background-image:
            image-set(
              url("/background-desktop.webp") type("image/webp"),
              url("/background-desktop.jpg") type("image/jpeg")
            );
        }
      }

      body::after {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        pointer-events: none;
        background:
          radial-gradient(
            circle at center,
            rgb(1 16 29 / 18%) 0%,
            rgb(1 10 18 / 62%) 58%,
            rgb(1 7 13 / 92%) 100%
          ),
          linear-gradient(
            90deg,
            rgb(1 7 13 / 62%),
            rgb(1 7 13 / 18%) 50%,
            rgb(1 7 13 / 62%)
          );
      }

      .page {
        width: min(760px, calc(100% - 40px));
        min-height: 100vh;
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(24px, 6vh, 72px) 0;
      }

      .shell {
        display: grid;
        gap: 24px;
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 24px;
        background: rgb(3 13 23 / 74%);
        box-shadow:
          0 28px 90px rgb(0 0 0 / 45%),
          inset 0 1px 0 rgb(255 255 255 / 5%);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .eyebrow {
        margin: 0;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #76dff5;
      }

      h1 {
        margin: 0;
        font-size: clamp(4rem, 15vw, 8rem);
        line-height: 0.9;
        letter-spacing: -0.055em;
      }

      h2 {
        margin: 0;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 500;
        line-height: 1.25;
        color: #d4dde7;
        text-wrap: balance;
      }

      p {
        max-width: 620px;
        margin: 0;
        font-size: clamp(1rem, 2vw, 1.1rem);
        line-height: 1.75;
        color: #c5d0db;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 4px;
      }

      .button {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 1px solid #62d7ee;
        border-radius: 999px;
        background: #62d7ee;
        color: #03111c;
        font-weight: 700;
        text-decoration: none;
        transition:
          transform 150ms ease,
          background-color 150ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        background: #83e4f6;
      }

      .button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 4px;
      }

      .footer {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        align-items: center;
        justify-content: space-between;
        padding-top: 24px;
        border-top: 1px solid rgb(255 255 255 / 10%);
        font-size: 0.9rem;
        color: #9eabb8;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
      }

      .text-link {
        color: #71dff4;
        text-underline-offset: 4px;
      }

      .text-link:focus-visible {
        outline: 2px solid #62d7ee;
        outline-offset: 4px;
      }

      @media (max-width: 1024px) {
        body::before {
          background-image: url("/background-tablet.jpg");
          background-position: center;
        }

        @supports (
          background-image:
            image-set(
              url("/background-tablet.webp") type("image/webp")
            )
        ) {
          body::before {
            background-image:
              image-set(
                url("/background-tablet.webp") type("image/webp"),
                url("/background-tablet.jpg") type("image/jpeg")
              );
          }
        }
      }

      @media (max-width: 640px) {
        body::before {
          background-image: url("/background-mobile.jpg");
          background-position: center top;
        }

        @supports (
          background-image:
            image-set(
              url("/background-mobile.webp") type("image/webp")
            )
        ) {
          body::before {
            background-image:
              image-set(
                url("/background-mobile.webp") type("image/webp"),
                url("/background-mobile.jpg") type("image/jpeg")
              );
          }
        }

        body::after {
          background:
            linear-gradient(
              180deg,
              rgb(1 8 15 / 10%) 0%,
              rgb(1 8 15 / 55%) 42%,
              rgb(1 8 15 / 95%) 100%
            );
        }

        .page {
          width: calc(100% - 20px);
          padding: 10px 0 24px;
        }

        .shell {
          gap: 22px;
          padding: 28px 22px;
          border-radius: 18px;
          background: rgb(3 13 23 / 82%);
        }

        .actions {
          display: grid;
        }

        .button {
          width: 100%;
        }

        .footer {
          align-items: flex-start;
          flex-direction: column;
        }

        .footer-links {
          flex-direction: column;
        }
      }

      @media (max-width: 380px) {
        .page {
          width: calc(100% - 14px);
        }

        .shell {
          padding: 24px 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .button {
          transition: none;
        }
      }

      @media (prefers-reduced-transparency: reduce) {
        .shell {
          background: #07131f;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
        }
      }

      @media print {
        body {
          background: #ffffff;
          color: #000000;
        }

        body::before,
        body::after {
          display: none;
        }

        .page,
        .shell {
          width: 100%;
          min-height: auto;
          margin: 0;
          padding: 0;
          border: 0;
          background: transparent;
          box-shadow: none;
        }

        h1,
        h2,
        p,
        .footer {
          color: #000000;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <main class="shell">
        <p class="eyebrow">Page not found</p>

        <h1>404</h1>

        <h2>This page does not exist.</h2>

        <p>
          The link may be outdated, incomplete, or the requested page may
          have been removed.
        </p>

        <div class="actions">
          <a
            class="button"
            href="/"
          >
            Back to homepage
          </a>
        </div>

        <footer class="footer">
          <span>
            © 2026 AFEOL
          </span>

          <nav
            class="footer-links"
            aria-label="External links"
          >
            <a
              class="text-link"
              href="https://github.com/AfeolOrg/ItsOnePage"
              target="_blank"
              rel="noopener noreferrer"
            >
              GitHub
            </a>

            <a
              class="text-link"
              href="https://www.linkedin.com/in/dragan-mitic/"
              target="_blank"
              rel="me noopener noreferrer"
            >
              LinkedIn
            </a>
          </nav>
        </footer>
      </main>
    </div>
  </body>
</html>
