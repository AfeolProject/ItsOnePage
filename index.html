<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >

    <title>ItsOnePage</title>

    <meta
      name="description"
      content="Open-source one-page websites without subscriptions, tracking, or vendor lock-in."
    >

    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #f0f6fc;
      }

      main {
        width: min(680px, calc(100% - 40px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 1;
      }

      h2 {
        margin: 0 0 32px;
        font-size: clamp(1.3rem, 4vw, 2rem);
        font-weight: 500;
        color: #c9d1d9;
      }

      p {
        max-width: 620px;
        margin: 0 0 16px;
        font-size: 1.1rem;
        line-height: 1.7;
        color: #c9d1d9;
      }

      .principle {
        margin-top: 40px;
        padding-top: 32px;
        border-top: 1px solid #30363d;
      }

      .principle strong {
        display: block;
        margin-bottom: 8px;
        color: #f0f6fc;
      }

      a {
        color: #58a6ff;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>ItsOnePage</h1>

      <h2>Own your website. Pay only for your domain.</h2>

      <p>
        Open-source one-page websites without subscriptions,
        tracking, or vendor lock-in.
      </p>

      <p>
        The project is currently in early development.
      </p>

      <p>
        <a href="https://github.com/AfeolOrg/ItsOnePage">
          View the project on GitHub
        </a>
      </p>

      <section class="principle">
        <strong>One Principle</strong>

        <p>
          If we recommend it, we use it ourselves first.
        </p>
      </section>
    </main>
  </body>
</html>
